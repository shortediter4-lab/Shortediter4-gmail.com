<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth Test</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

    <h1>Firebase Login</h1>
    
    <div id="user-info">
        <p id="status">Loading...</p>
        <button id="login-btn" style="display: none;" onclick="login()">Login with Google</button>
        <button id="logout-btn" style="display: none;" onclick="logout()">Logout</button>
    </div>

    <script>
      // 2. Your Firebase Configuration
      const firebaseConfig = {
        apiKey: "XXXX",
        authDomain: "XXXX",
        projectId: "XXXX",
        storageBucket: "XXXX",
        messagingSenderId: "XXXX",
        appId: "XXXX"
      };

      // 3. Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const provider = new firebase.auth.GoogleAuthProvider();

      // 4. Login Function
      function login() {
        auth.signInWithPopup(provider)
          .then((result) => {
            console.log("Logged in as:", result.user.displayName);
          })
          .catch((error) => {
            alert("Error: " + error.message);
          });
      }

      // 5. Logout Function
      function logout() {
        auth.signOut();
      }

      // 6. UI Manager (Check if user is logged in or out)
      const statusText = document.getElementById('status');
      const loginBtn = document.getElementById('login-btn');
      const logoutBtn = document.getElementById('logout-btn');

      auth.onAuthStateChanged((user) => {
        if (user) {
          statusText.innerText = "Welcome, " + user.displayName;
          loginBtn.style.display = "none";
          logoutBtn.style.display = "block";
        } else {
          statusText.innerText = "Please log in.";
          loginBtn.style.display = "block";
          logoutBtn.style.display = "none";
        }
      });
    </script>
</body>
</html>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("message").innerText = "Signup success";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("message").innerText = "Login success";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};
</script>
